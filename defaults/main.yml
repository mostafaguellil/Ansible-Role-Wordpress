---
# defaults/main.yml
wordpress_db_name: wordpress
wordpress_db_user: example
wordpress_db_password: examplePW
mysql_root_password: examplerootPW
wordpress_download_url: https://wordpress.org/latest.zip
wordpress_tmp_dir: /tmp
wordpress_install_dir: /var/www/html
package_list_debian:
  - apache2
  - php
  - libapache2-mod-php
  - php-mysql
  - mariadb-server
  - wget
  - unzip
package_list_redhat:
  - httpd
  - php
  - php-mysqlnd
  - mariadb-server
  - wget
  - unzip
apache_service_name_debian: apache2
apache_service_name_redhat: httpd
apache_start_cmd_debian: service apache2 start
apache_start_cmd_redhat: /usr/sbin/httpd -DFOREGROUND &
mariadb_service_name: mariadb
apache_vhost_conf: wordpress.conf
apache_vhost_path: /etc/apache2/sites-available
apache_docroot: "{{ wordpress_install_dir }}"
apache_server_admin: admin@localhost
apache_error_log: "{{ lookup('env','APACHE_LOG_DIR') }}/error.log"
apache_access_log: "{{ lookup('env','APACHE_LOG_DIR') }}/access.log"
wp_owner: www-data
wp_group: www-data
wp_file_mode: 0644
wp_dir_mode: 0755
wp_config_mode: 0640
secure_mysql: true
mysql_remove_anonymous_users: true
mysql_remove_test_db: true
mysql_reload_privileges: true