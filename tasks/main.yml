---
- name: Debug OS family
  ansible.builtin.debug:
    var: ansible_os_family

- name: Update apt/dnf cache
  ansible.builtin.package:
    update_cache: yes

- name: Install required packages (Ubuntu)
  ansible.builtin.apt:
    name:
      - apache2
      - php
      - libapache2-mod-php
      - php-mysql
      - mariadb-server
      - wget
      - unzip
    state: present
  when: ansible_os_family == "Debian"

- name: Install required packages (Rocky / RHEL)
  ansible.builtin.dnf:
    name:
      - httpd
      - php
      - php-mysqlnd
      - mariadb-server
      - wget
      - unzip
    state: present
  when: ansible_os_family in ["RedHat", "Rocky"]

- name: Remove default index.html
  ansible.builtin.file:
    path: "{{ wordpress_dir }}/index.html"
    state: absent

- name: Define WordPress file ownership
  set_fact:
    wp_owner: "www-data"
    wp_group: "www-data"
    wp_file_mode: "0644"
    wp_dir_mode: "0755"
    wp_config_mode: "0640"

- name: Collect service facts
  ansible.builtin.service_facts:

- name: Start Apache (Ubuntu)
  ansible.builtin.service:
    name: apache2
    state: started
    enabled: true
  when: ansible_os_family == "Debian"
  notify: Restart Apache

- name: Start Apache (Rocky)
  ansible.builtin.service:
    name: httpd
    state: started
    enabled: true
  when: ansible_os_family in ["RedHat", "Rocky"]
  notify: Restart Apache

- name: Start MariaDB (Ubuntu)
  ansible.builtin.service:
    name: mariadb
    state: started
    enabled: true
  when: ansible_os_family == "Debian"

- name: Start MariaDB (Rocky)
  ansible.builtin.service:
    name: mariadb
    state: started
    enabled: true
  when: ansible_os_family in ["RedHat", "Rocky"]

- name: Wait for MariaDB to start
  ansible.builtin.pause:
    seconds: 10

- name: Download WordPress
  ansible.builtin.get_url:
    url: "{{ wordpress_url }}"
    dest: /tmp/wordpress.zip
    mode: '0644'

- name: Unzip WordPress archive
  ansible.builtin.unarchive:
    src: /tmp/wordpress.zip
    dest: /tmp
    remote_src: yes

- name: Copy WordPress files to web root
  ansible.builtin.copy:
    src: /tmp/wordpress/
    dest: "{{ wordpress_dir }}"
    owner: "{{ wp_owner }}"
    group: "{{ wp_group }}"
    mode: "{{ wp_dir_mode }}"
    remote_src: yes

- name: Create wp-config.php
  ansible.builtin.template:
    src: wp-config.php.j2
    dest: "{{ wordpress_dir }}/wp-config.php"
    owner: "{{ wp_owner }}"
    group: "{{ wp_group }}"
    mode: "{{ wp_config_mode }}"
